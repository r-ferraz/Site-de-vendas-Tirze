<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maori | Avaliação de Saúde</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --progress-width: 0%;
        }

        body {
            background-color: var(--bg-offwhite);
            margin: 0;
            padding: 0;
        }

        .q-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 50px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 71, 171, 0.08);
            min-height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: transform 0.3s ease;
        }

        .progress-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: #F1F5F9;
            z-index: 1001;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), #3b82f6);
            width: var(--progress-width);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .q-title {
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .q-options {
            display: grid;
            gap: 16px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 24px;
            border: 2px solid #F1F5F9;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.15rem;
            background: white;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .option-btn:hover {
            border-color: var(--primary-blue);
            background: #F8FBFF;
            transform: translateY(-2px);
        }

        .option-btn.selected {
            border-color: var(--primary-blue);
            background: var(--accent-blue);
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.1);
        }

        .input-group {
            margin-top: 20px;
        }

        .q-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .q-input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        #next-btn {
            margin-top: 30px;
            width: 100%;
        }

        /* Evolution Chart Mockup */
        .evolution-chart {
            width: 100%;
            height: 300px;
            background: #f8fbff;
            border-radius: 16px;
            margin-top: 20px;
            position: relative;
            padding: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .chart-bar {
            width: 8%;
            background: var(--primary-blue);
            border-radius: 4px 4px 0 0;
            transition: height 1s ease;
        }

        @media (max-width: 768px) {
            .q-container {
                margin: 100px 10px 20px 10px; /* 100px to clear the fixed header */
                padding: 30px 20px;
                min-height: auto;
                box-sizing: border-box;
                width: calc(100% - 20px);
            }

            .q-title {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }

            .option-btn {
                padding: 16px 12px;
                font-size: 1rem;
                text-align: center;
                justify-content: center;
                flex-direction: column;
                gap: 8px;
            }

            .evolution-chart {
                height: 200px;
                padding: 10px;
            }

            .q-input {
                padding: 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <header
        style="height: 80px; background: white; border-bottom: 1px solid #edf2f7; display: flex; align-items: center;">
        <div class="container" style="display: flex; justify-content: center; width: 100%;">
            <a href="index.html" class="logo">
                <img src="assets/Asset 10.svg" alt="Maori Saúde" style="height: 40px; width: auto;">
            </a>
        </div>
    </header>

    <div class="progress-bar-container">
        <div class="progress-bar"></div>
    </div>

    <div class="container">
        <div id="questionnaire-box" class="q-container">
            <!-- Dynamic Content -->
            <div id="step-content">
                <h2 class="q-title">Vamos começar sua jornada</h2>
                <div class="q-options">
                    <!-- Options here -->
                </div>
            </div>
            <button id="next-btn" class="btn btn-primary">Continuar</button>
        </div>

        <div id="results-box" class="q-container" style="display: none; max-width: 800px;">
            <h2 class="q-title">Seu Plano Personalizado</h2>
            <div id="evolution-section">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: 20px;">
                    <div style="text-align: center; padding-bottom: 10px; align-self: flex-start; margin-top: 10px;">
                        <div style="font-size: 2.5rem; line-height: 1;">😟</div>
                        <div style="font-size: 0.9rem; font-weight: bold; color: #666; margin-top: 5px;">Início</div>
                    </div>
                    <div class="evolution-chart" id="chart-container" style="flex: 1; margin: 0 15px; padding: 10px 0 0 0; background: transparent; border-bottom: 2px solid #E2E8F0; border-radius: 0; align-items: flex-end; position: relative;">
                        <!-- Bars generated by JS -->
                    </div>
                    <div style="text-align: center; padding-bottom: 10px;">
                        <div style="font-size: 2.5rem; line-height: 1;">😄</div>
                        <div style="font-size: 0.9rem; font-weight: bold; color: var(--primary-blue); margin-top: 5px;">Reta Final</div>
                    </div>
                </div>
            </div>
            <div id="plan-details" style="margin-top: 30px;">
                <!-- Plan summary -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="questions.js"></script>
    <script src="questionario.js"></script>
</body>

</html>
