<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maori | Pedido Confirmado</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="utm.js"></script>
    <style>
        :root {
            --primary: #9d4615;
            --primary-light: #bc551b;
            --primary-dark: #7a3610;
            --success: #059669;
            --bg-page: #fdfaf7;
            --bg-card: #ffffff;
            --text-main: #3d2b24;
            --text-muted: #7e6b62;
            --border-soft: #e9dccf;
            --shadow-premium: 0 20px 40px rgba(61, 43, 36, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .checkout-header {
            background: white;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-soft);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            padding: 0 1.5rem;
        }

        .success-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .card-premium {
            background: var(--bg-card);
            max-width: 500px;
            width: 100%;
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: var(--shadow-premium);
            text-align: center;
            border: 1px solid rgba(157, 70, 21, 0.04);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-circle {
            width: 100px;
            height: 100px;
            background: #f0fdf4;
            border: 3px solid var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: var(--success);
            font-size: 3rem;
            font-weight: 800;
            box-shadow: 0 0 30px rgba(5, 150, 105, 0.15);
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        .success-msg {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
            font-size: 1rem;
        }

        .steps-box {
            background: #fdfaf7;
            border: 1.5px solid #eee4dc;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2.5rem;
            text-align: left;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .steps-box strong {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .steps-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .steps-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .steps-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--success);
            font-weight: 700;
        }

        .btn-home {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
            display: inline-block;
            box-shadow: 0 10px 20px rgba(157, 70, 21, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-home:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .support-msg {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .support-msg a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
        }

        .support-msg a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card-premium { padding: 2.5rem 1.5rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>

<body>
    <header class="checkout-header">
        <div class="header-inner">
            <img src="assets/Asset 10.svg" alt="Maori Saúde" style="height: 32px;">
        </div>
    </header>

    <main class="success-content">
        <div class="card-premium">
            <div class="success-circle">✓</div>
            <h1>Seu pedido foi recebido!</h1>
            <p class="success-msg">
                Estamos processando seu pagamento em instantes entraremos em contato.
            </p>

            <div class="steps-box">
                <strong>🛡️ Próximos Passos:</strong>
                <ul class="steps-list">
                    <li>Confirmação de pagamento no Asaas</li>
                    <li>Liberação do acesso à plataforma em até 24h</li>
                    <li>Agendamento com nossa equipe médica</li>
                </ul>
            </div>

            <a href="https://wa.me/5511913506985?text=Ola,%20fiz%20meu%20pedido%20e%20gostaria%20de%20falar%20com%20o%20atendimento" target="_blank" class="btn-home">FALAR COM O ATENDIMENTO</a>


        </div>
    </main>
</body>

</html>
