<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maori | Finalizar Pagamento</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d4615;
            --bg-page: #fdfaf7;
            --border-soft: #e9dccf;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita scroll duplo com o iframe */
            background-color: var(--bg-page);
            font-family: 'Inter', sans-serif;
        }

        .checkout-header {
            background: white;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-soft);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        .checkout-header img {
            height: 32px;
        }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 70px);
            position: relative;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(157, 70, 21, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 15px;
            color: #7e6b62;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <header class="checkout-header">
        <img src="assets/Asset 10.svg" alt="Maori Saúde">
    </header>

    <main class="iframe-container">
        <div id="loader" class="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">Conectando ao checkout seguro...</div>
        </div>
        <iframe id="checkout-frame" src="about:blank" allow="payment"></iframe>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const checkoutUrl = params.get('checkout_url');

            if (!checkoutUrl) {
                window.location.href = 'pagamento.html';
                return;
            }

            const frame = document.getElementById('checkout-frame');
            const loader = document.getElementById('loader');

            // Reconstrói a URL com UTMs que vieram no parâmetro
            let finalUrl = decodeURIComponent(checkoutUrl);
            
            // Adiciona parâmetros de UTM se existirem no localtion.search mas não na checkoutUrl
            const currentSearch = window.location.search;
            if (currentSearch && !finalUrl.includes('?')) {
                // Remove o paramentro checkout_url do search antes de anexar
                const cleanSearch = currentSearch.replace(/[\?&]checkout_url=[^&]+/, '');
                if (cleanSearch) {
                    finalUrl += (finalUrl.includes('?') ? '&' : '?') + cleanSearch.substring(1);
                }
            }

            frame.src = finalUrl;

            frame.onload = () => {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }, 800);
            };
        });
    </script>
</body>

</html>
