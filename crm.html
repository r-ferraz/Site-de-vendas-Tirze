<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maori | CRM Leads</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-crm: #f0f4f8;
            --column-bg: #ebedef;
            --card-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg-crm);
        }

        .crm-header {
            background: white;
            padding: 20px 0;
            border-bottom: 1px solid #ddd;
            margin-bottom: 30px;
        }

        .kanban-board {
            display: flex;
            gap: 20px;
            padding: 0 20px;
            align-items: flex-start;
            overflow-x: auto;
            min-height: calc(100vh - 150px);
        }

        .kanban-column {
            background: var(--column-bg);
            border-radius: 12px;
            width: 350px;
            min-width: 350px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            margin-bottom: 10px;
        }

        .column-title {
            font-weight: 700;
            color: #4a5568;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .lead-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: var(--card-shadow);
            border-left: 4px solid var(--primary-blue);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .lead-card:hover {
            transform: translateY(-2px);
        }

        .lead-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: var(--text-dark);
        }

        .lead-info {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 15px;
        }

        .lead-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tag-receita {
            background: #e0f2fe;
            color: #0369a1;
        }

        .tag-questionario {
            background: #fef3c7;
            color: #92400e;
        }

        .lead-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <header class="crm-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" class="logo">
                <img src="assets/Asset 10.svg" alt="Maori Saúde" style="height: 40px; width: auto;">
            </a>
            <h1 style="font-size: 1.5rem; color: var(--primary-dark);">Painel de Gestão de Leads</h1>
            <button class="btn btn-outline btn-sm" onclick="fetchLeads()">Atualizar</button>
        </div>
    </header>

    <div class="kanban-board">
        <div class="kanban-column" id="col-novo" ondrop="drop(event, 'Novo')" ondragover="allowDrop(event)">
            <div class="column-header">
                <span class="column-title">🔥 Novo</span>
                <span class="count" id="count-novo">0</span>
            </div>
            <div class="column-list" id="list-novo"></div>
        </div>

        <div class="kanban-column" id="col-analise" ondrop="drop(event, 'Em Análise')" ondragover="allowDrop(event)">
            <div class="column-header">
                <span class="column-title">🧐 Em Análise</span>
                <span class="count" id="count-analise">0</span>
            </div>
            <div class="column-list" id="list-analise"></div>
        </div>

        <div class="kanban-column" id="col-finalizado" ondrop="drop(event, 'Finalizado')" ondragover="allowDrop(event)">
            <div class="column-header">
                <span class="column-title">✅ Finalizado</span>
                <span class="count" id="count-finalizado">0</span>
            </div>
            <div class="column-list" id="list-finalizado"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Editar Lead</h2>
            <input type="hidden" id="edit-id">
            <div class="input-group" style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Nome</label>
                <input type="text" id="edit-nome" class="q-input">
            </div>
            <div class="input-group" style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">WhatsApp</label>
                <input type="tel" id="edit-whatsapp" class="q-input">
            </div>
            <div class="input-group" style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:5px;">Transcrição da IA</label>
                <div id="view-transcription" style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.9rem; max-height: 200px; overflow-y: auto; white-space: pre-wrap; color: #475569;">
                    Nenhuma transcrição encontrada.
                </div>
            </div>
            <div class="lead-actions">
                <button class="btn btn-primary" onclick="saveEdit()">Salvar</button>
                <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="crm.js"></script>
</body>

</html>
