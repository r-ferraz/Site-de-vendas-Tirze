<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maori | Checkout Seguro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="utm.js"></script>
    <style>
        :root {
            --primary: #9d4615;
            --primary-light: #bc551b;
            --primary-dark: #7a3610;
            --bg-page: #fdfaf7;
            --bg-card: #ffffff;
            --text-main: #3d2b24;
            --text-muted: #7e6b62;
            --border-soft: #e9dccf;
            --shadow-premium: 0 20px 40px rgba(61, 43, 36, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .checkout-header {
            background: white;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-soft);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.95);
        }

        .checkout-container {
            max-width: 680px;
            margin: 2rem auto 4rem;
            padding: 0 1.5rem;
        }

        /* Nav Items */
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 1.5rem;
        }

        /* Stepper */
        .progress-stepper {
            display: flex;
            justify-content: space-between;
            margin: 2.5rem auto 3.5rem;
            position: relative;
            max-width: 420px;
        }

        .progress-stepper::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 5px;
            right: 5px;
            height: 2px;
            background: #eee4dc;
            z-index: 1;
        }

        .step-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .step-pill {
            width: 36px;
            height: 36px;
            background: white;
            border: 2px solid #eee4dc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .step-item.active .step-pill {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(157, 70, 21, 0.35);
        }

        .step-item.completed .step-pill {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }

        .step-label {
            margin-top: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .step-item.active .step-label {
            color: var(--primary);
        }

        /* Card System */
        .card-premium {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-premium);
            margin-bottom: 2rem;
            border: 1px solid rgba(157, 70, 21, 0.04);
            transition: var(--transition);
        }

        .card-title {
            font-family: 'Lora', serif;
            font-size: 1.4rem;
            margin-bottom: 2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .card-title span {
            font-size: 1.2rem;
            filter: grayscale(1);
            opacity: 0.4;
        }

        /* Form Controls */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
        }

        .premium-input {
            width: 100%;
            padding: 12px 18px;
            border: 1.5px solid #eee4dc;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: var(--transition);
            color: var(--text-main);
            background: #fff;
            box-sizing: border-box;
        }

        .premium-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(157, 70, 21, 0.04);
        }

        .premium-input::placeholder {
            color: #bfaea5;
        }

        /* Protocol Style */
        .protocol-selection {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .protocol-item {
            border: 1.5px solid #eee4dc;
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        .protocol-item:hover {
            border-color: var(--primary-light);
            background: #fdfaf7;
        }

        .protocol-item.active {
            border-color: var(--primary);
            background: rgba(157, 70, 21, 0.02);
            box-shadow: 0 8px 20px rgba(157, 70, 21, 0.06);
        }

        .protocol-info h3 {
            margin: 0 0 4px 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .protocol-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .protocol-price {
            text-align: right;
        }

        .price-old {
            font-size: 0.8rem;
            text-decoration: line-through;
            color: #bfaea5;
            display: block;
        }

        .price-new {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
        }

        /* Action Section */
        .checkout-actions {
            margin-top: 3rem;
            text-align: center;
        }

        .btn-premium {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(157, 70, 21, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-premium:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(157, 70, 21, 0.25);
        }

        .btn-premium:active {
            transform: translateY(0);
        }

        .terms-check {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .terms-check input {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        /* Search Button */
        .btn-search {
            height: 46px;
            padding: 0 20px;
            background: #f4ece4;
            color: var(--text-main);
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-search:hover {
            background: #e9dccf;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .input-grid {
                grid-template-columns: 1fr;
                gap: 0;
            }
            
            .card-premium {
                padding: 1.8rem 1.2rem;
                border-radius: 16px;
            }

            .checkout-container {
                margin: 1rem auto 3rem;
            }
            
            .step-label {
                display: none;
            }
            
            .progress-stepper {
                max-width: 280px;
                margin-bottom: 2rem;
            }
        }

        /* Error States */
        .error-field {
            border-color: #ea5455 !important;
            background: #fffcfc !important;
        }

        .error-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>

<body>
    <header class="checkout-header">
        <div class="header-inner">
            <img src="assets/Asset 10.svg" alt="Maori Saúde" style="height: 32px;">
        </div>
    </header>

    <main class="checkout-container">
        <!-- Progress -->
        <div class="progress-stepper">
            <div class="step-item active">
                <div class="step-pill">1</div>
                <div class="step-label">Contato</div>
            </div>
            <div class="step-item">
                <div class="step-pill">2</div>
                <div class="step-label">Entrega</div>
            </div>
            <div class="step-item">
                <div class="step-pill">3</div>
                <div class="step-label">Protocolo</div>
            </div>
            <div class="step-item">
                <div class="step-pill" style="opacity: 0.4">4</div>
                <div class="step-label">Finalizar</div>
            </div>
        </div>

        <!-- Section 1: Contact -->
        <div class="card-premium">
            <h2 class="card-title"><span>01</span> Seus Dados</h2>
            <div class="input-group">
                <label>E-mail institucional ou pessoal</label>
                <input type="email" class="premium-input" placeholder="seu@email.com" id="checkout-email">
            </div>
            <div class="input-grid">
                <div class="input-group">
                    <label>WhatsApp</label>
                    <input type="tel" class="premium-input" placeholder="(00) 00000-0000" id="checkout-tel">
                </div>
                <div class="input-group">
                    <label>CPF</label>
                    <input type="text" class="premium-input" placeholder="000.000.000-00" id="checkout-cpf">
                </div>
            </div>
        </div>

        <!-- Section 2: Address -->
        <div class="card-premium">
            <h2 class="card-title"><span>02</span> Local de Entrega</h2>
            <div style="display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items: flex-end; margin-bottom: 1.5rem;">
                <div class="input-group" style="margin-bottom: 0;">
                    <label>CEP</label>
                    <input type="text" class="premium-input" placeholder="00000-000" id="cep">
                </div>
                <button class="btn-search" id="btn-cep">PESQUISAR</button>
            </div>
            
            <div class="input-group">
                <label>Endereço</label>
                <input type="text" class="premium-input" id="rua" placeholder="Rua, Avenida, Praça...">
            </div>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>Número</label>
                    <input type="text" class="premium-input" id="numero" placeholder="Ex: 123">
                </div>
                <div class="input-group">
                    <label>Bairro</label>
                    <input type="text" class="premium-input" id="bairro" placeholder="Bairro">
                </div>
            </div>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>Cidade</label>
                    <input type="text" class="premium-input" id="cidade" placeholder="Cidade">
                </div>
                <div class="input-group">
                    <label>UF</label>
                    <input type="text" class="premium-input" id="estado" maxlength="2" placeholder="Estado">
                </div>
            </div>
        </div>

        <!-- Section 3: Protocol -->
        <div class="card-premium">
            <h2 class="card-title"><span>03</span> Escolha o Protocolo</h2>
            <div class="protocol-selection">
                <div class="protocol-item active" data-plano="20" data-valor="1200.00" data-preco="1.200" onclick="selectPlano(this)">
                    <div class="protocol-info">
                        <h3>Tratamento 20mg</h3>
                        <p>Acompanhamento médico + Personalizado</p>
                    </div>
                    <div class="protocol-price">
                        <span class="price-old">R$ 1.500</span>
                        <span class="price-new">R$ 1.200</span>
                    </div>
                </div>

                <div class="protocol-item" data-plano="60" data-valor="2800.00" data-preco="2.800" onclick="selectPlano(this)">
                    <div class="protocol-info">
                        <h3>Tratamento 60mg</h3>
                        <p>Protocolo Estendido + Suporte VIP</p>
                    </div>
                    <div class="protocol-price">
                        <span class="price-old">R$ 3.500</span>
                        <span class="price-new">R$ 2.800</span>
                    </div>
                </div>
            </div>

            <div class="checkout-actions">
                <label class="terms-check">
                    <input type="checkbox" id="accept-terms">
                    Li e aceito os termos de responsabilidade.
                </label>
                <button id="btn-prosseguir" class="btn-premium">
                    PROSSEGUIR PARA O PAGAMENTO
                </button>
            </div>
        </div>
    </main>

    <script>
        let selectedPlano = { id: '20', valor: '1200.00', preco: '1.200' };

        window.selectPlano = (element) => {
            document.querySelectorAll('.protocol-item').forEach(p => p.classList.remove('active'));
            element.classList.add('active');
            selectedPlano = {
                id: element.getAttribute('data-plano'),
                valor: element.getAttribute('data-valor'),
                preco: element.getAttribute('data-preco')
            };
        };

        // ViaCEP integration
        const btnCep = document.getElementById('btn-cep');
        btnCep.addEventListener('click', async () => {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if(cep.length !== 8) return;
            btnCep.innerText = "...";
            try {
                const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await resp.json();
                if(!data.erro) {
                    document.getElementById('rua').value = data.logradouro || '';
                    document.getElementById('bairro').value = data.bairro || '';
                    document.getElementById('cidade').value = data.localidade || '';
                    document.getElementById('estado').value = data.uf || '';
                    document.getElementById('numero').focus();
                }
            } catch(e) {}
            btnCep.innerText = "PESQUISAR";
        });

        // Masks
        const mask = (id, fn) => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', e => e.target.value = fn(e.target.value));
        };
        mask('checkout-tel', v => v.replace(/\D/g, '').substring(0, 11).replace(/^(\d{2})(\d)/, "($1) $2").replace(/(\d{5})(\d)/, "$1-$2"));
        mask('checkout-cpf', v => v.replace(/\D/g, '').substring(0, 11).replace(/^(\d{3})(\d)/, "$1.$2").replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1-$2"));
        mask('cep', v => v.replace(/\D/g, '').substring(0, 8).replace(/^(\d{5})(\d)/, "$1-$2"));

        // Redirect & Logic
        document.getElementById('btn-prosseguir').addEventListener('click', () => {
            const fields = ['checkout-email', 'checkout-tel', 'checkout-cpf', 'cep', 'rua', 'numero', 'bairro', 'cidade', 'estado'];
            let valid = true;
            
            fields.forEach(id => {
                const el = document.getElementById(id);
                if(!el.value) { 
                    el.classList.add('error-field'); 
                    el.classList.add('error-shake');
                    setTimeout(() => el.classList.remove('error-shake'), 400);
                    valid = false; 
                } else el.classList.remove('error-field');
            });

            if(!document.getElementById('accept-terms').checked) {
                alert("Por favor, aceite os termos de responsabilidade.");
                return;
            }

            if(!valid) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            // Persistence
            const leadData = {
                email: document.getElementById('checkout-email').value,
                whatsapp: document.getElementById('checkout-tel').value,
                cpf: document.getElementById('checkout-cpf').value,
                cep: document.getElementById('cep').value,
                endereco: document.getElementById('rua').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value
            };
            localStorage.setItem('maori_checkout_lead', JSON.stringify(leadData));

            const baseUrl = `finalizar-pagamento.html?plano=${selectedPlano.id}&valor=${selectedPlano.valor}&preco=${selectedPlano.preco}`;
            const finalUrl = window.addUtmsToUrl ? window.addUtmsToUrl(baseUrl) : baseUrl;
            window.location.href = finalUrl;
        });
    </script>
</body>
</html>
