<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maori | Checkout Seguro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f8fafc;
            color: var(--text-dark);
        }

        .checkout-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .checkout-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #edf2f7;
        }

        .step-number {
            width: 30px;
            height: 30px;
            background: var(--primary-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a5568;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .form-input.error {
            border-color: #e53e3e !important;
            background-color: #fff5f5;
        }

        .error-message {
            color: #e53e3e;
            font-size: 0.8rem;
            margin-top: 4px;
            display: none;
        }

        /* Summary Card */
        .summary-card {
            position: sticky;
            top: 100px;
        }

        .product-info {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .product-img {
            width: 80px;
            height: 80px;
            background: #f1f5f9;
            border-radius: 12px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #718096;
        }

        .price-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f1f5f9;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .trust-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #718096;
            margin-top: 20px;
        }

        .trust-badge svg {
            color: #48bb78;
        }

        @media (max-width: 968px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }

            .summary-card {
                position: static;
                order: -1;
            }
        }
    </style>
</head>

<body>
    <header
        style="height: 80px; background: white; border-bottom: 1px solid #edf2f7; display: flex; align-items: center;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" class="logo">
                <img src="assets/Asset 10.svg" alt="Maori Saúde" style="height: 40px; width: auto;">
            </a>
            <div style="font-size: 0.9rem; color: #64748b; display: flex; align-items: center; gap: 8px;">
                🔒 Checkout Seguro
            </div>
        </div>
    </header>

    <div class="checkout-layout">
        <div class="checkout-steps">
            <!-- Step 1: Contact -->
            <div class="checkout-card">
                <div class="step-header">
                    <div class="step-number">1</div>
                    <h2 style="font-size: 1.25rem; font-family: var(--font-sans);">Dados de Contato</h2>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" class="form-input" placeholder="seu@email.com" id="checkout-email">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="tel" class="form-input" placeholder="(00) 00000-0000" id="checkout-tel">
                    </div>
                </div>
            </div>

            <!-- Step 2: Shipping -->
            <div class="checkout-card">
                <div class="step-header">
                    <div class="step-number">2</div>
                    <h2 style="font-size: 1.25rem; font-family: var(--font-sans);">Informações de Entrega</h2>
                </div>
                <div class="form-row" style="grid-template-columns: 1fr 0.5fr;">
                    <div class="form-group">
                        <label>CEP</label>
                        <input type="text" class="form-input" placeholder="00000-000" id="cep" maxlength="9">
                        <small id="cep-error" style="color: #e53e3e; display: none; margin-top: 5px;"></small>
                    </div>
                    <div class="form-group">
                        <label>&nbsp;</label>
                        <button type="button" class="btn btn-primary" id="btn-cep"
                            style="padding: 12px; width: 100%; font-size: 0.9rem;">Buscar</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Rua / Avenida</label>
                    <input type="text" class="form-input" id="rua">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Bairro</label>
                        <input type="text" class="form-input" id="bairro">
                    </div>
                    <div class="form-group">
                        <label>Cidade</label>
                        <input type="text" class="form-input" id="cidade">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Estado (UF)</label>
                        <input type="text" class="form-input" id="estado" maxlength="2">
                    </div>
                    <div class="form-group">
                        <label>Número</label>
                        <input type="text" class="form-input" id="numero">
                    </div>
                </div>
                <div class="form-group">
                    <label>Complemento</label>
                    <input type="text" class="form-input" id="complemento">
                </div>
            </div>

            <!-- Step 3: Payment -->
            <div class="checkout-card">
                <div class="step-header">
                    <div class="step-number">3</div>
                    <h2 style="font-size: 1.25rem; font-family: var(--font-sans);">Pagamento</h2>
                </div>
                <div class="form-group">
                    <label>Nome no Cartão</label>
                    <input type="text" class="form-input" id="card-name" placeholder="Nome como no cartão">
                </div>
                <div class="form-group">
                    <label>Número do Cartão</label>
                    <input type="text" class="form-input" id="card-number" placeholder="0000 0000 0000 0000">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Validade</label>
                        <input type="text" class="form-input" id="card-expiry" placeholder="MM/AA">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" class="form-input" id="card-cvv" placeholder="000">
                    </div>
                </div>
                <div class="form-group">
                    <label>Parcelamento</label>
                    <select class="form-input" id="parcelamento">
                        <option>1x de R$ 914,85 (Sem juros)</option>
                        <option>2x de R$ 457,43 (Sem juros)</option>
                        <option>3x de R$ 304,95 (Sem juros)</option>
                    </select>
                </div>
                <button id="btn-finalizar" class="btn btn-primary"
                    style="width: 100%; padding: 20px; font-size: 1.2rem; margin-top: 20px;">Finalizar Pedido</button>
            </div>
        </div>

        <div class="summary-card">
            <div class="checkout-card">
                <h3 style="margin-bottom: 20px; font-family: var(--font-sans);">Resumo do Pedido</h3>
                <div class="product-info">
                    <div class="product-img"
                        style="background-image: url('assets/semaglutida.png'); background-size: contain; background-repeat: no-repeat; background-position: center;">
                    </div>
                    <div>
                        <p style="font-weight: 600;">Plano Maori - Wegovy®</p>
                        <p style="font-size: 0.85rem; color: #718096;">Tratamento mensal + Suporte</p>
                    </div>
                </div>
                <div class="price-row">
                    <span>Subtotal</span>
                    <span>R$ 2.198,00</span>
                </div>
                <div class="price-row" style="color: #48bb78;">
                    <span>Desconto Maori</span>
                    <span>- R$ 1.283,15</span>
                </div>
                <div class="price-row">
                    <span>Entrega</span>
                    <span style="color: #48bb78;">Grátis</span>
                </div>
                <div class="price-total">
                    <span>Total</span>
                    <span>R$ 914,85</span>
                </div>

                <div style="margin-top: 30px;">
                    <div class="trust-badge">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm0-2a6 6 0 100-12 6 6 0 000 12z"
                                clip-rule="evenodd" />
                        </svg>
                        Avaliação médica em 24h
                    </div>
                    <div class="trust-badge">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 4.925-3.467 9.07-8.156 10.05a1.003 1.003 0 01-1.688 0C3.467 16.07 0 11.925 0 7.001c0-.68.056-1.35.166-2.002zm9.417 5.071a1 1 0 00-1.414-1.414L8 10.586 6.828 9.414a1 1 0 00-1.414 1.414l1.882 1.882a1 1 0 001.415 0l3.271-3.271z"
                                clip-rule="evenodd" />
                        </svg>
                        Seguro e Criptografado
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://pzewkvmaewnijwhxkqaj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6ZXdrdm1hZXduaWp3aHhrcWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjk0ODQsImV4cCI6MjA4ODc0NTQ4NH0.a42vFvm5vUcZ3euBUoNW_QuWM9MKPW2W7ZvcCyl_P4Y';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const cepInput = document.getElementById('cep');
        const btnCep = document.getElementById('btn-cep');
        const cepError = document.getElementById('cep-error');

        async function searchCep() {
            const cep = cepInput.value.replace(/\D/g, '');
            if (cep.length !== 8) {
                showError('CEP inválido');
                return;
            }

            try {
                btnCep.disabled = true;
                btnCep.innerText = 'Buscando...';
                cepError.style.display = 'none';

                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();

                if (data.erro) {
                    showError('CEP não encontrado');
                } else {
                    document.getElementById('rua').value = data.logradouro;
                    document.getElementById('bairro').value = data.bairro;
                    document.getElementById('cidade').value = data.localidade;
                    document.getElementById('estado').value = data.uf;
                    document.getElementById('numero').focus();
                }
            } catch (error) {
                showError('Erro ao buscar CEP');
            } finally {
                btnCep.disabled = false;
                btnCep.innerText = 'Buscar';
            }
        }

        function showError(msg) {
            cepError.innerText = msg;
            cepError.style.display = 'block';
        }

        btnCep.addEventListener('click', searchCep);

        // Auto-search when 8 digits are typed
        cepInput.addEventListener('keyup', (e) => {
            const val = e.target.value.replace(/\D/g, '');
            if (val.length === 8) searchCep();
        });

        // Mask for CEP
        cepInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 5) {
                val = val.substring(0, 5) + '-' + val.substring(5, 8);
            }
            e.target.value = val;
        });

        // Mask for Phone (WhatsApp)
        const telInput = document.getElementById('checkout-tel');
        telInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 11) val = val.substring(0, 11);
            if (val.length > 10) {
                val = `(${val.substring(0, 2)}) ${val.substring(2, 7)}-${val.substring(7, 11)}`;
            } else if (val.length > 6) {
                val = `(${val.substring(0, 2)}) ${val.substring(2, 6)}-${val.substring(6, 10)}`;
            } else if (val.length > 2) {
                val = `(${val.substring(0, 2)}) ${val.substring(2)}`;
            } else if (val.length > 0) {
                val = `(${val}`;
            }
            e.target.value = val;
        });

        // Mask for Card Number
        const cardInput = document.getElementById('card-number');
        cardInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 16) val = val.substring(0, 16);
            val = val.replace(/(\d{4})(?=\d)/g, '$1 ');
            e.target.value = val;
        });

        // Mask for Expiry
        const expiryInput = document.getElementById('card-expiry');
        expiryInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 4) val = val.substring(0, 4);
            if (val.length > 2) {
                val = `${val.substring(0, 2)}/${val.substring(2)}`;
            }
            e.target.value = val;
        });

        // Mask for CVV
        const cvvInput = document.getElementById('card-cvv');
        cvvInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 4) val = val.substring(0, 4); // some cards have 4 digits
            e.target.value = val;
        });

        const finishBtn = document.getElementById('btn-finalizar');

        function validateForm() {
            const requiredFields = [
                'checkout-email', 'checkout-tel', 'cep', 'rua', 'bairro',
                'cidade', 'estado', 'numero', 'card-name', 'card-number',
                'card-expiry', 'card-cvv'
            ];

            let isValid = true;
            requiredFields.forEach(id => {
                const el = document.getElementById(id);
                if (!el.value || el.value.trim() === '') {
                    el.classList.add('error');
                    isValid = false;
                } else {
                    el.classList.remove('error');
                }
            });

            // Email validation
            const email = document.getElementById('checkout-email');
            if (email.value && !email.value.includes('@')) {
                email.classList.add('error');
                isValid = false;
            } else {
                email.classList.remove('error');
            }

            if (!isValid) {
                alert('Por favor, preencha todos os campos obrigatórios corretamente.');
            }
            return isValid;
        }

        finishBtn.addEventListener('click', async () => {
            if (!validateForm()) return;

            finishBtn.disabled = true;
            finishBtn.innerText = 'Processando...';

            const leadData = {
                email: document.getElementById('checkout-email').value,
                whatsapp: document.getElementById('checkout-tel').value,
                cep: document.getElementById('cep').value,
                endereco: `${document.getElementById('rua').value}, ${document.getElementById('numero').value}`,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                complemento: document.getElementById('complemento').value,
                nome_cartao: document.getElementById('card-name').value,
                parcelamento: document.getElementById('parcelamento').value,
                status: 'Aguardando Pagamento',
                tipo_origem: 'Checkout'
            };

            try {
                const { error } = await supabase
                    .from('leads')
                    .insert([leadData]);

                if (error) throw error;

                // Pós-Venda: Redirecionamento automático para o WhatsApp
                setTimeout(() => {
                    alert('Pedido capturado com sucesso! Você será direcionado para o nosso WhatsApp para concluir a avaliação e finalizar o pagamento.');
                    const mensagem = encodeURIComponent(`Olá! Acabei de finalizar o pedido da minha avaliação no site e gostaria de seguir com o próximo passo.`);
                    // O número abaixo pode ser alterado diretamente aqui no href
                    window.location.href = `https://wa.me/5511999999999?text=${mensagem}`;
                }, 1500);

            } catch (err) {
                console.error('Error saving lead:', err);
                alert('Ocorreu um erro ao processar seu pedido. Por favor, tente novamente.');
                finishBtn.disabled = false;
                finishBtn.innerText = 'Finalizar Pedido';
            }
        });
    </script>
</body>

</html>
